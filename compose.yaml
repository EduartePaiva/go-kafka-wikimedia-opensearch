services:
  kafka:
    image: apache/kafka:4.2.0
    container_name: kafka
    ports:
      - "9092:9092"
      - "9094:9094"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      # Unique Kafka cluster identifier (required for KRaft mode)
      KAFKA_CLUSTER_ID: "kafka-course-cluster-1"

      #################################
      # Controller Quorum config (Raft)
      #################################
      # List of controllers nodes that form the Raft quorum
      KAFKA_CONTROLLER_QUORUM_VOTERS: "1@kafka:9093"
      # Listener name used by controllers for internal Raft communication
      KAFKA_CONTROLLER_LISTENER_NAMES: "CONTROLLER"

      #################################
      # Network Listeners (internal, external & controllers)
      #################################
      # Define all listener endpoints for this kafka node
      KAFKA_LISTENERS: >
        PLAINTEXT://0.0.0.0:9092,
        EXTERNAL://0.0.0.0:9094,
        CONTROLLER://0.0.0.0:9093
      # What each listener advertises to connecting clients
      # Internal (Docker containers): broker:9092
      # External (host machine): localhost:9094
      KAFKA_ADVERTISED_LISTENERS: >
        PLAINTEXT://kafka:9092,
        EXTERNAL://localhost:9094
      # Maps listener names to their security protocols
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: >
        CONTROLLER:PLAINTEXT,
        PLAINTEXT:PLAINTEXT,
        EXTERNAL:PLAINTEXT
      # Which listener brokers should use for internal communication
      KAFKA_INTER_BROKER_LISTENER_NAME: "PLAINTEXT"

      #################################
      # Single node cluster safety settings
      #   (because replication >1 would break)
      #################################
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1

      #################################
      # broker defaults & quality-of-life settings
      #################################
      # speed up consumer group startup
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      # auto-create topics if they don't already exists
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      # Default number of partitions per topic
      KAFKA_NUM_PARTITIONS: 1

    volumes:
      - kafka_data:/var/lib/kafka/data
  kafka-ui:
    image: ghcr.io/kafbat/kafka-ui:latest
    container_name: kafka-ui
    ports:
      - "8070:8080"
    depends_on:
      - kafka
    environment:
      KAFKA_CLUSTERS_0_NAME: local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:9092 # use internal docker name
      DYNAMIC_CONFIG_ENABLED: "true"
  kafka-schema-registry:
    image: confluentinc/cp-schema-registry:8.1.2
    hostname: kafka-schema-registry
    ports:
      - "8081:8081"
    environment:
      SCHEMA_REGISTRY_KAFKASTORE_BOOTSTRAP_SERVERS: PLAINTEXT://kafka:9092
      SCHEMA_REGISTRY_HOST_NAME: kafka-schema-registry
      SCHEMA_REGISTRY_LISTENERS: http://0.0.0.0:8081
    depends_on:
      - kafka
  opensearch:
    image: opensearchproject/opensearch:3.5.0
    container_name: "opensearch"
    environment:
      discovery.type: "single-node"
      DISABLE_SECURITY_PLUGIN: "true"
      DISABLE_INSTALL_DEMO_CONFIG: "true"
    ports:
      - "9200:9200"
      - "9600:9600"
  opensearch-dashboards:
    image: opensearchproject/opensearch-dashboards:3.5.0
    container_name: opensearch-dashboards
    ports:
      - "5601:5601"
    environment:
      - 'OPENSEARCH_HOSTS=["http://opensearch:9200"]'
      - "DISABLE_SECURITY_DASHBOARDS_PLUGIN=true" # disables security dashboards plugin in OpenSearch Dashboards

volumes:
  kafka_data:
